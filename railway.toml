# railway.toml — Railway deployment configuration
# Docs: https://docs.railway.app/reference/config-as-code

[build]
# Install dependencies then download the spaCy model
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python -m spacy download en_core_web_sm"

[deploy]
# Start the FastAPI backend on the platform-assigned PORT
startCommand = "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120       # seconds — model loading takes a while on first boot
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
